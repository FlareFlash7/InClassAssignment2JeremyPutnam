<!DOCTYPE html>

<html>

<h1>Interactive Reveal: What’s That Animal?</h1>
<p>Click on the buttons below to reveal the animal images</p>

<div class="buttons">
  <button onclick="toggleAnimal('cat')">Reveal a CAT</button>
  <button onclick="toggleAnimal('dog')">Reveal a DOG</button>
  <button onclick="toggleAnimal('cow')">Reveal a COW</button>
  <button onclick="resetZoo()">Reset Zoo</button>
</div>

<div class="zoo">
  <img id="cat" src="cat.png" alt="Cat" style="display:none;">
  <img id="dog" src="dog.png" alt="Dog" style="display:none;">
  <img id="cow" src="cow.png" alt="Cow" style="display:none;">
</div>

<h3 id="counter">Animals on Screen: 0</h3>

</body>

</html>
